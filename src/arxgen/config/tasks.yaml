retrieval_task:
  description: >
    Interroger l'API ArXiv pour les thématiques suivantes : {topics}.
    Il faut filtrer les {max_results} résultats les plus récents. 
    Pour chaque papier, on doit récupérer impérativement : le titre exact, l'abstract (le résumé) complet, 
    la date de publication et l'URL du PDF.
  expected_output: >
    Un catalogue structuré de papiers de recherche, prêt pour une analyse approfondie.
  agent: researcher

extraction_task:
  description: >
    À partir des abstracts fournis, analyse chaque papier. 
    Identifie la problématique centrale, la solution technique (architecture/algorithme) 
    et les métriques de succès. Compare brièvement à ce qui existe déjà si l'abstract le mentionne.
    Rédige le tout en Français sous forme de rapport structuré.
  expected_output: >
    Un rapport de veille technologique en Markdown. Chaque papier doit avoir sa section avec 
    des titres clairs, une fiche technique de 10 lignes maximum, et un lien vers le PDF.
  agent: analyst
  output_file: rapport_veille.md